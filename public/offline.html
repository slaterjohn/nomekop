<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>Offline — Nomekop</title>
    <!-- Standalone fallback served by the service worker when a page is requested
         with no network and nothing cached. Fully self-contained (inline styles,
         no fonts/scripts) so it renders with zero network. -->
    <style>
      :root {
        --gb-ink: #0f380f;
        --gb-bg: #9bbc0f;
        --gb-accent: #8bac0f;
      }
      * {
        box-sizing: border-box;
      }
      html,
      body {
        margin: 0;
        height: 100%;
      }
      body {
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px;
        background: var(--gb-bg);
        color: var(--gb-ink);
        font-family: ui-monospace, "SFMono-Regular", "Cascadia Code", Menlo, Consolas, monospace;
        -webkit-font-smoothing: none;
        text-align: center;
      }
      main {
        max-width: 26rem;
        border: 4px solid var(--gb-ink);
        background: var(--gb-accent);
        padding: 28px 24px;
        box-shadow: 6px 6px 0 var(--gb-ink);
      }
      img {
        width: 80px;
        height: 80px;
        image-rendering: pixelated;
        display: block;
        margin: 0 auto 16px;
      }
      h1 {
        margin: 0 0 12px;
        font-size: 1.05rem;
        letter-spacing: 0.04em;
        text-transform: uppercase;
      }
      p {
        margin: 0 0 18px;
        font-size: 0.95rem;
        line-height: 1.5;
      }
      a.retry {
        display: inline-block;
        font: inherit;
        text-decoration: none;
        text-transform: uppercase;
        letter-spacing: 0.04em;
        border: 3px solid var(--gb-ink);
        background: var(--gb-bg);
        color: var(--gb-ink);
        padding: 10px 18px;
        box-shadow: 3px 3px 0 var(--gb-ink);
      }
      a.retry:active {
        transform: translate(3px, 3px);
        box-shadow: none;
      }
    </style>
  </head>
  <body>
    <main>
      <img src="/icon-192.png" alt="Nomekop" width="80" height="80" />
      <h1>You're offline</h1>
      <p>
        Nomekop can't reach the network right now. Your saved collections live on
        this device and are safe — reconnect to load sets and prices.
      </p>
      <a class="retry" href="/">Back to Nomekop ▶</a>
    </main>
  </body>
</html>
