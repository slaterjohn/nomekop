name: CI

on:
  push:
    branches: [main, feature/**]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Unit & component tests
        run: pnpm test

      - name: Build
        # Hermetic build for the test job: the fixture data source means the SSG
        # sitemap/OG prerender reads committed snapshots instead of the live (and
        # in CI, unkeyed/flaky) pokémon API. The e2e server below runs in fixture
        # mode too, so the prerendered content matches what the specs assert.
        run: pnpm build
        env:
          TCG_DATA_SOURCE: fixture

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium

      # The PDF pipeline (lib/pdf.ts) launches Chrome via Puppeteer, not
      # Playwright. Puppeteer's postinstall downloads Chrome to ~/.cache/puppeteer,
      # but setup-node's pnpm store cache can restore puppeteer on a cache hit
      # WITHOUT re-running that postinstall — leaving "Could not find Chrome" and
      # 504s on every PDF e2e. Install it explicitly (idempotent) so it's always
      # present regardless of cache state.
      - name: Install Puppeteer Chrome
        run: pnpm exec puppeteer browsers install chrome

      - name: End-to-end tests
        run: pnpm e2e

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report
          retention-days: 7

  docker:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Build image
        run: docker build -t bindermon:ci .

  # Deployment scaffold (spec §11): wire up registry credentials + VPS secrets
